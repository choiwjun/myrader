id: HOME
name: 홈 피드
route: /home
purpose: 재방문 시작점에서 오늘 볼 상태, 라이벌 차이, 주간 검색어, 오늘 할 일을 한 화면에 요약한다.
principles:
  - 모바일 우선
  - 한 카드에 하나의 판단
  - 점수보다 상태와 다음 행동
  - evidence는 sheet로 접어 제공

entry:
  first_visit_from: /find
  revisit_start: true

layout:
  mobile: single_column
  desktop:
    content_width: 560
    side_panel: evidence_or_change_only

cards:
  - id: hero_today_one
    order: 1
    component: M-01 Status Banner
    purpose: 지금 가장 먼저 볼 변화와 오늘 처리할 한 가지를 보여준다.
    states:
      - normal
      - diagnosis_running
      - insufficient_evidence
      - failed
    cta_targets:
      - /write
      - /status

  - id: channel_status
    order: 2
    component: M-03 Signal Row
    purpose: 네이버, 구글, SNS, AI 인용 재료 상태를 요약한다.
    states:
      - good
      - needs_work
      - not_ready
    state_symbols:
      good: "● 좋음"
      needs_work: "◐ 손볼 곳"
      not_ready: "○ 준비 전"
    cta_target: /status

  - id: rival_one_line
    order: 3
    component: M-06 Change Card
    purpose: 경쟁자가 앞서는 이유와 내게 없는 것을 한 줄로 보여준다.
    states:
      - changed
      - unchanged
      - unavailable
    cta_target: /rivals

  - id: weekly_search_terms
    order: 4
    component: M-05 Search Term Card
    purpose: 이번 주 사람들이 찾는 말과 레이더 관심/결과 상태를 보여준다.
    state_source: radar_preview_and_latest_scan
    states:
      - S8_interest
      - S8_waiting
      - S9_result
      - S9_empty_result
      - S9_failed
    cta_targets:
      - /write
      - /settings

  - id: steady_next_step
    order: 5
    component: M-02 To-do Card
    purpose: 리뷰, 사진, 메뉴, 소개글처럼 꾸준히 쌓을 행동을 제안한다.
    states:
      - has_task
      - completed_today
      - postponed
    cta_target: /write

radar_interest_sheet:
  component: M-07 Interest Sheet
  owner_card: weekly_search_terms
  route_policy: contextual_sheet_not_primary_route
  must_show:
    - 다음 스캔 예정일
    - 관심 키워드 설명
    - /write 진입 안내
  states:
    - closed
    - open
    - saved
    - failed

acceptance:
  - /home이 재방문 시작점이다.
  - 카드 순서는 ① HERO, ② 채널 상태, ③ 라이벌, ④ 주간 검색어, ⑤ 꾸준한 한 걸음으로 고정한다.
  - S8/S9는 route가 아니라 weekly_search_terms card state다.
  - checkout page를 primary route로 만들지 않는다.
  - 결제 sheet나 외부 알림 설정을 만들지 않는다.
  - 근거 없는 실측 표현을 쓰지 않는다.
