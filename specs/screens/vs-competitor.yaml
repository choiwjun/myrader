# Rivals 화면 (vs-competitor.yaml) — REQ-003 + REQ-004
# 기존 S3 경쟁 비교와 S4 역공학 갭을 /rivals 한 화면으로 통합한다.

version: "3.0"

screen:
  id: RIVALS
  name: 라이벌
  route: /rivals
  legacy_routes: [/compare, /gap]
  layout: mobile_single_column
  auth: false
  purpose: 경쟁자가 앞서는 이유와 우리 가게에 빠진 재료를 한 화면에서 보여준다.

data_requirements:
  - resource: competitor
    needs: [id, name, channel, beatsMe, rank, source, collectedAt]
    filters:
      diagnosisId: "?diagnosisId"

  - resource: gapItem
    needs: [id, label, competitorHas, iHave, category, actionTier, priority, isPaid, evidence]
    filters:
      diagnosisId: "?diagnosisId"

  - resource: channelStatus
    needs: [channel, signal, summaryLine]
    filters:
      diagnosisId: "?diagnosisId"

components:
  - id: rival_headline
    component: M-06 Change Card
    position: header
    function: "옆집은 있고, 우리는 없는 것"을 한 문장으로 요약한다.
    data_source:
      resource: competitor
    states:
      - changed
      - unchanged
      - unavailable

  - id: competitor_one_line_cards
    type: list
    position: main
    function: 경쟁자별 강점과 출처를 한 줄 카드로 표시한다.
    data_source:
      resource: competitor
    rules:
      - 경쟁사 비방 금지
      - source를 네이버 검색/AI 확인 등 사장님 언어로 표시
      - beatsMe가 없으면 손실 프레이밍 대신 유지/개선 메시지 표시

  - id: reverse_gap_section
    type: list
    position: main
    function: 경쟁자가 갖췄고 우리에게 부족한 키워드/사진/리뷰/메뉴/소개글/AI 재료를 보여준다.
    data_source:
      resource: gapItem
    rules:
      - priority 오름차순 정렬
      - 우선순위가 높은 갭부터 보여주고 모든 갭은 /write 진입점을 가진다.
      - 모든 갭은 actionTier와 /write 진입점을 가진다

  - id: evidence_sheet
    component: M-04 Evidence Sheet
    position: sheet
    function: 비교 근거, 수집 시각, 출처, 실측/추정/실패 라벨을 제공한다.
    data_source:
      resources: [competitor, gapItem]

  - id: write_cta
    component: M-02 To-do Card
    position: footer
    function: 선택한 갭을 해결할 문안 또는 행동으로 이동한다.
    events:
      - on: click
        do: /write 로 이동

connections:
  navigations:
    - from: rival_headline
      to: /rivals
    - from: reverse_gap_section
      to: /write
    - from: write_cta
      to: /write
  redirects:
    - from: /compare
      to: /rivals
    - from: /gap
      to: /rivals
  shared_components:
    - app_header
    - bottom_navigation
    - evidence_sheet
  external:
    - diagnosis_engine

tests:
  - name: 경쟁 비교와 갭이 한 화면에 표시된다
    when: /rivals 접속
    then:
      - 경쟁자 한 줄 비교가 보임
      - 갭 섹션이 같은 화면에 보임
      - /gap으로 별도 이동하지 않음

  - name: legacy route redirect
    when: /compare 또는 /gap 접속
    then:
      - /rivals로 이동하거나 동일 화면 alias가 렌더됨

  - name: 출처 정직성 표시
    when: evidence sheet를 열음
    then:
      - 수집 시각과 출처가 보임
      - 근거 없는 실측 표현이 없음

  - name: 갭에서 문안으로
    when: 갭 카드 CTA 클릭
    then:
      - /write로 이동

notes:
  - S3/S4는 별도 primary screen이 아니다.
  - 결제 경계 없이 현재 제공 가능한 갭과 다음 행동을 보여준다.
  - "따라하면 AI 추천" 또는 "매출 보장" 표현 금지.
