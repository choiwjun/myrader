services:
  postgres:
    image: postgres:16-alpine
    container_name: boina-local-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-boina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-boina-dev-password}
      POSTGRES_DB: ${POSTGRES_DB:-boina_db}
    ports:
      - "${BOINA_POSTGRES_PORT:-5436}:5432"
    volumes:
      - boina_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-boina} -d ${POSTGRES_DB:-boina_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  boina_postgres_data:
