                "on-secondary-fixed-variant": "#92400e",
                "tertiary-fixed": "#34d399",
                "on-tertiary-fixed-variant": "#005236",

<body class="flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-surface">
<div class="flex justify-between items-center px-container-margin py-md w-full max-w-[1280px] mx-auto">
<div class="flex items-center gap-sm">
<img alt="Boina Logo" class="h-8 md:h-10 object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLuE9Y3PTeTBuO-DrrfjkJAyeQ9EO2RAtz-3KyeR-sS84M-37T3z37rItK1eestSVf4gXpt3EYHLO3dPEpCFPsdnkF5YhQ7SOFAoAaoD9bWJO6foxQU2HWeACYBf0HlapjSl9feovD8vDOo3Ppj1_Hy_letlDY5aQMpEzWHoWrP3D9v8bf2h_Rxq9uVxNE939zOuVX0DdYXzphwso29eQLnH82ghArt5H7hs7K9yvHnusobRc8gmEJp3bm8"/>
</div>
<div class="flex items-center gap-md">
<button class="text-on-surface-variant font-label-sm text-label-sm hover:opacity-80 transition-opacity">도움말</button>
</div>
</div>
</header>
<!-- Main Content: Login Screen (Centered Card with sophisticated spacing) -->
<main class="flex-grow flex items-center justify-center px-container-margin py-3xl mt-16">
<div class="w-full max-w-[480px] space-y-xl">
<!-- Branding & Title -->
<div class="text-center md:text-left space-y-md">
<h1 class="font-headline-xl text-headline-xl text-on-surface tracking-tight">보이나에 로그인</h1>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                    결제와 내 정보 관리에 필요해요. <br class="hidden md:block"/>
                    가게 살펴보기는 로그인 없이도 할 수 있어요.
                </p>
</div>
<!-- Login Form -->
<div class="bg-surface-container-lowest p-lg md:p-xl rounded-xl shadow-[0px_4px_24px_rgba(0,0,0,0.02)] border border-outline-variant">
<form class="space-y-lg" onsubmit="return false;">
<div class="space-y-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="email">이메일</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-[56px] pl-12 pr-4 bg-surface-container rounded-lg border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all font-body-md text-body-md" id="email" placeholder="이메일 주소 입력" type="email"/>
</div>
</div>
<div class="space-y-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">비밀번호</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-[56px] pl-12 pr-4 bg-surface-container rounded-lg border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all font-body-md text-body-md" id="password" placeholder="비밀번호 입력" type="password"/>
</div>
</div>
<div class="pt-sm">
<button class="w-full h-[56px] bg-primary text-on-primary font-headline-md text-headline-md rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm">
                            로그인
                        </button>
</div>
</form>
<!-- Divider & Social (Simplified for premium look) -->
<div class="mt-xl flex items-center gap-md">
<div class="flex-grow h-px bg-outline-variant"></div>
<span class="font-label-xs text-label-xs text-outline uppercase tracking-wider">honest connection</span>
<div class="flex-grow h-px bg-outline-variant"></div>
</div>
<div class="mt-lg text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant">
                        아직 계정이 없으시면 <span class="text-primary font-semibold">정식 오픈 때</span> 가입을 안내해 드릴게요.
                    </p>
</div>
</div>
<!-- Trust Badge / Footnote -->
<div class="flex flex-col items-center justify-center gap-sm opacity-60">
<span class="material-symbols-outlined text-outline text-[24px]">verified_user</span>
<p class="font-label-xs text-label-xs text-on-surface-variant text-center">보이나는 사용자의 소중한 개인정보를<br/>가장 안전한 방식으로 보호합니다.</p>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-xl px-container-margin flex flex-col md:flex-row justify-between items-center gap-md border-t border-outline-variant bg-surface-container-lowest">
<div class="flex flex-col md:flex-row items-center gap-md">
<span class="font-headline-md text-headline-md font-bold text-on-surface">보이나</span>
<span class="font-label-xs text-label-xs text-on-surface-variant">© 2024 Boina. All rights reserved.</span>
</div>
<div class="flex gap-lg">
<a class="font-label-xs text-label-xs text-on-surface-variant hover:text-primary transition-colors" href="#">이용약관</a>
<a class="font-label-xs text-label-xs text-on-surface-variant hover:text-primary transition-colors" href="#">개인정보처리방침</a>
<a class="font-label-xs text-label-xs text-on-surface-variant hover:text-primary transition-colors" href="#">고객센터</a>
</div>
</footer>
<script>
        // Micro-interaction for the login button
        document.querySelector('button.bg-primary').addEventListener('click', function() {
            const btn = this;
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="animate-spin material-symbols-outlined">sync</span>`;
            btn.style.pointerEvents = 'none';
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.pointerEvents = 'auto';
                // Success logic or redirection could go here
            }, 1200);
        });

        // Atmospheric background pulse effect
        const main = document.querySelector('main');
        main.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            main.style.background = `radial-gradient(circle at ${x * 100}% ${y * 100}%, rgba(99, 102, 241, 0.03) 0%, rgba(248, 249, 255, 0) 50%)`;
        });
    </script>
</body></html>
